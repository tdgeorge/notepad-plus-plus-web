name: Gemini AI Coder
on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  gemini-fix:
    # --- SECURITY LAYER ---
    # Only allows the Repository OWNER to trigger the AI.
    # For issues (opened/edited): issue author must be OWNER and title starts with 'GAI:'.
    # For issue comments: the commenter must be OWNER and comment starts with '/gemini'.
    if: |
      (github.event_name == 'issues' && github.event.issue.author_association == 'OWNER' && startsWith(github.event.issue.title, 'GAI:')) ||
      (github.event_name == 'issue_comment' && github.event.comment.author_association == 'OWNER' && startsWith(github.event.comment.body, '/gemini'))
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Always checks out the default branch; never a PR/fork branch.
          ref: ${{ github.event.repository.default_branch }}

      - name: Gemini Code Assist
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489 # v0.1.22
        env:
          # --- AUTHENTICATION & SECURITY ---
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # --- RUNNER SETTINGS ---
          GEMINI_CLI_TRUST_WORKSPACE: true
          GEMINI_CLI_NON_INTERACTIVE: true
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Instruction: ${{ github.event.comment.body || github.event.issue.body }}
            Context: Update the codebase to reflect the instruction above.
          
          # --- CONTEXT MAPPING ---
          # Passing these ensures Gemini knows whether to create a new PR 
          # or update the current one.
          github_issue_number: ${{ github.event.issue.number }}
          github_pr_number: ${{ github.event.pull_request.number }}
