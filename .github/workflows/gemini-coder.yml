name: Gemini AI Coder
on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  gemini-fix:
    # Trigger if Issue title starts with 'GAI:' OR if a PR comment starts with '/gemini'
    if: |
      startsWith(github.event.issue.title, 'GAI:') || 
      startsWith(github.event.comment.body, '/gemini')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # If it's a comment on a PR, checkout that branch. Otherwise, checkout default branch.
          ref: ${{ github.event.pull_request.head.ref || github.event.repository.default_branch }}
      - name: Gemini Code Assist
        uses: google-github-actions/run-gemini-cli@main
        env:
          # Required for the underlying CLI engine
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Prevents the "No auth" warning in some runner environments
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Ensures the tool doesn't wait for user input on your iPhone
          GEMINI_CLI_NON_INTERACTIVE: true
        with:
          # Use the exact parameter name the new action expects
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Instruction: ${{ github.event.comment.body || github.event.issue.body }}
            Context: Modify the code to fulfill the instruction.
          create_pull_request: ${{ github.event.issue.title != '' }}
