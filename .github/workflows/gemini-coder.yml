name: Gemini AI Coder
on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  gemini-fix:
    # --- STRICT SECURITY LAYER ---
    # Only runs if the Repository OWNER triggers it.
    # Checks for GAI: in titles or /gemini in comments.
    if: |
      github.event.issue.author_association == 'OWNER' &&
      (startsWith(github.event.issue.title, 'GAI:') || startsWith(github.event.comment.body, '/gemini'))
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.event.repository.default_branch }}

      - name: Gemini Code Assist
        uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: true
          GEMINI_CLI_NON_INTERACTIVE: true
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Instruction: ${{ github.event.comment.body || github.event.issue.body }}
            Context: Modify the code to fulfill the instruction above.
          create_pull_request: ${{ github.event.issue.title != '' && startsWith(github.event.issue.title, 'GAI:') }}
